name: Board — Cleanup Legacy Data

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no writes to Notion)'
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: board-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run cleanup
        run: node scripts/cleanup-legacy-data.mjs
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          BOARD_DB_ID:  ${{ vars.BOARD_DB_ID }}
          DRY_RUN:      ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
          LOG_LEVEL:    info
